# Defining Name For Application
spring.application.name=DishaApplication 

#Logging Pattern Configurations :
logging.pattern.console=${CONSOLE_LOG_PATTERN:%green(%d{HH:mm:ss.SSS}) %blue(%-5level) %red([%thread]) %yellow(%logger{15}) - %cyan(%msg%n)}

# Logging Configuration
#logging.level.root=${LOG_LEVEL:INFO}
logging.level.com.firebase.dishaapplication=${LOG_LEVEL:INFO}

logging.group.jobportal_error=com.firebase.dishaapplication.security,com.firebase.dishaapplication.contact
logging.level.jobportal_error=${LOG_LEVEL_ERROR:ERROR}

#logging.file.name=logs/jobportal.log
#logging.pattern.file={"timestamp":"%d{yyyy-MM-dd HH:mm:ss}","level":"%p","logger":"%c","message":"%m"}

# Mysql Database Configuration
spring.datasource.url=jdbc:mysql://${DATABASE_HOST:localhost}:${DATABASE_PORT:3306}/${DATABASE_NAME:jobportal}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:root}

# Enable SQL Query Logging
spring.jpa.show-sql=${SHOW_SQL:true}

# Format SQL for better readability
spring.jpa.properties.hibernate.format_sql=${HIBERNATE_FORMAT_SQL:true}

# Docker Compose Commands
#spring.docker.compose.file=jobportal-compose.yml  : If the compose.yml file is in different location
spring.docker.compose.lifecycle-management=start_and_stop
spring.docker.compose.start.command=up
spring.docker.compose.stop.command=stop

